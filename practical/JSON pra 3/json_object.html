<html>
<head>
<title>JSONObjectExample</title>
</head>
<body>
<h2>JSONObjectOutput</h2>
<p id="result"></p>
<script>

let student={
"name":"Aniket",
"age":20,
"course":"ComputerScience",
"marks":{
"html":85,
"css":90,
"javascript":88
}
};
let output="Name:"+student.name+"<br>"+
    "Age:"+student.age+"<br>"+
"Course:"+student.course+"<br>"+
"HTMLMarks:"+student.marks.html+"<br>";
document.getElementById("result").innerHTML=output;
</script>
</body>
</html>
